# Render Blueprint — deploy Stray Cat Hunter (web + PostgreSQL)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stray-cat-hunter
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stray-cat-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: AI_PROVIDER
        value: mock
      - key: REQUIRE_GPS
        value: "true"
      - key: MAX_GPS_ACCURACY_M
        value: "150"
      - key: MAPBOX_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: stray-cat-db
    plan: free
    databaseName: straycat
    user: straycat
